version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "../supabase/migrations"
    gen:
      go:
        package: "repository"
        out: "repository"
        sql_package: "pgx/v5"
overrides:
  go:
    rename:
      app_entry: Entry
      app_term_days_off: TermDaysOff
      app_term: Term
      app_user: User
